<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1t CTF 2026 </title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050508;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-frame {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .page-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(2, 4, 10, 0.78);
            backdrop-filter: blur(14px);
        }

        .page-modal[hidden] {
            display: none;
        }

        .modal-card {
            width: min(100%, 520px);
            padding: 32px 28px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: linear-gradient(180deg, rgba(10, 18, 28, 0.96), rgba(7, 10, 14, 0.96));
            box-shadow: 0 0 48px rgba(0, 212, 255, 0.14);
            text-align: center;
        }

        .modal-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.7rem;
            letter-spacing: 3px;
            margin-bottom: 14px;
            color: #fff36b;
        }

        .modal-card p {
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: nowrap;
            align-items: stretch;
        }

        .modal-actions .btn {
            padding: 14px 20px;
        }

        .logo-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            animation: pulse 3s ease-in-out infinite;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: #fff;
            padding: 18px 40px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }

        .btn-featured {
            border: 2px solid #fff36b;
            background: linear-gradient(135deg, rgba(255, 243, 107, 0.12), rgba(0, 212, 255, 0.08));
            box-shadow: 0 0 24px rgba(255, 243, 107, 0.18), inset 0 0 20px rgba(255, 243, 107, 0.08);
        }

        .btn-featured .year {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: #fff36b;
            text-shadow: 0 0 16px rgba(255, 243, 107, 0.55);
        }

        .btn-featured .status {
            display: block;
            margin-top: 8px;
            font-size: 0.82rem;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        .btn-main {
            border: 2px solid var(--neon-blue);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .btn-main:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        .btn-archive {
            border: 2px solid var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
            box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.1);
        }

        .btn-archive:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 40px var(--neon-purple);
        }

        .btn-dismiss {
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
        }

        .modal-actions .btn {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .modal-actions .btn-dismiss {
            flex-direction: row;
        }

        .btn-dismiss:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.08);
        }

        .btn span {
            position: relative;
            z-index: 2;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px var(--neon-blue));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 40px var(--neon-blue));
            }
        }

        .v-badge {
            background: var(--neon-purple);
            font-size: 0.6rem;
            padding: 2px 6px;
            vertical-align: middle;
            margin-left: 10px;
            border-radius: 2px;
            color: white;
        }

        @media (max-width: 640px) {
            .main-frame {
                width: calc(100% - 32px);
                padding: 28px 18px;
            }

            h1 {
                font-size: 2.2rem;
                letter-spacing: 3px;
            }

            .btn {
                padding: 16px 20px;
            }

            .btn-featured .year {
                font-size: 1.1rem;
                letter-spacing: 3px;
            }

            .btn-featured .status {
                font-size: 0.74rem;
                letter-spacing: 1px;
            }

            .modal-card {
                padding: 26px 18px;
            }

            .modal-card h3 {
                font-size: 1.3rem;
                letter-spacing: 2px;
            }

            .modal-actions {
                flex-wrap: wrap;
            }

            .modal-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="page-modal" id="redirect-modal" role="dialog" aria-modal="true" aria-labelledby="redirect-title">
        <div class="modal-card">
            <h3 id="redirect-title">Go To 2026 Event?</h3>
            <p>Do you want to redirect to <strong>2026.v1t.site</strong> for the V1T CTF 2026 event page?</p>
            <div class="modal-actions">
                <a href="https://2026.v1t.site" class="btn btn-featured">
                    <span class="year">GO to V1t CTF 2026</span>
                </a>
                <button type="button" class="btn btn-dismiss" id="stay-here">
                    <span>Stay Here</span>
                </button>
            </div>
        </div>
    </div>

    <div class="main-frame">
        <div class="logo-wrapper">
            <img src="v1t.png" alt="V1t Logo" class="logo-img">
        </div>

        <h1>V1T CTF 2026</h1>
        <h2>Coming soon</h2>
        <br><br>
        <div class="btn-container">
            <a href="https://2026.v1t.site" class="btn btn-featured" aria-label="V1T CTF 2026 early access status">
                <span class="year">2026 Event</span>
                <span class="status">Early access registration is not open yet</span>
            </a>

            <a href="https://v1t.site" class="btn btn-main">
                <span>⚡ Main Website [v1t.site]</span>
            </a>

            <a href="https://2025.v1t.site" class="btn btn-archive">
                <span>📂 V1t 2025 Archive <span class="v-badge">LEGACY</span></span>
            </a>
        </div>
    </div>
    <script>
        const redirectModal = document.getElementById('redirect-modal');
        const stayHereButton = document.getElementById('stay-here');

        stayHereButton.addEventListener('click', () => {
            redirectModal.hidden = true;
        });
    </script>
</body>

</html>
