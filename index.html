<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1t CTF 2026 | UNLOCK THE ARCHIVE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050508;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-frame {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .logo-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            animation: pulse 3s ease-in-out infinite;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: #fff;
            padding: 18px 40px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }

        .btn-main {
            border: 2px solid var(--neon-blue);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .btn-main:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        .btn-archive {
            border: 2px solid var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
            box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.1);
        }

        .btn-archive:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 40px var(--neon-purple);
        }

        .btn span {
            position: relative;
            z-index: 2;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px var(--neon-blue));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 40px var(--neon-blue));
            }
        }

        .v-badge {
            background: var(--neon-purple);
            font-size: 0.6rem;
            padding: 2px 6px;
            vertical-align: middle;
            margin-left: 10px;
            border-radius: 2px;
            color: white;
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>

    <div class="main-frame">
        <div class="logo-wrapper">
            <img src="v1t.png" alt="V1t Logo" class="logo-img">
        </div>

        <h1>V1T CTF 2026</h1>
        <h2>Coming soon</h2>
        <br><br>
        <div class="btn-container">
            <a href="https://v1t.site" class="btn btn-main">
                <span>⚡ Main Website [v1t.site]</span>
            </a>

            <a href="https://2025.v1t.site" class="btn btn-archive">
                <span>📂 V1t 2025 Archive <span class="v-badge">LEGACY</span></span>
            </a>
        </div>
    </div>
</body>

</html>
